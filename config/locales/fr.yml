  privacy:
    registration: |
      <p>Lorsque vous vous inscrivez auprès de TeSS, nous vous demandons un nom d'utilisateur, un mot de passe et une adresse de courriel.</p> 
      <ul>
      <li>Votre nom d'utilisateur est utilisé pour l'authentification et l'attribution. Ces informations sont visibles publiquement, par exemple lorsqu'un utilisateur consulte une ressource que vous avez créée.</li> 
      <li>
      Votre mot de passe est stocké sous forme de hachage sécurisé cryptographiquement et n'est pas visible publiquement.</li> 
      <li>Votre adresse de courriel est utilisée pour vérifier votre identité et pour être utilisée lors de la demande de réinitialisation de votre mot de passe. Cette adresse de courriel n'est pas visible publiquement, mais vous pouvez spécifier une adresse e-mail publique supplémentaire (voir ci-dessous).</li> </ul>

    personal: "Vous pouvez également fournir un profil, contenant votre nom, une adresse e-mail publique, un lien vers le site Web et un avatar. Ces informations sont accessibles publiquement à tous les utilisateurs."
    resources: "Les détails des supports de formation et des événements que vous enregistrez seront visibles publiquement et consultables. Tous les workflows et packages créés peuvent être rendus privés, auquel cas seuls vous, les collaborateurs que vous spécifiez et les administrateurs TESS pourront les consulter et les rechercher."
    server: "Lorsque vous naviguez sur TESS, le serveur enregistre automatiquement les journaux des pages auxquelles vous accédez, du moment où vous y avez accédé et de votre adresse IP. Ces journaux sont utilisés pour corriger les erreurs et ne sont pas partagés avec des tiers. Les informations sensibles (telles que les mots de passe) sont automatiquement supprimées."
    cookies: "Explora utilise des « cookies strictement nécessaires » pour que le site fonctionne. Ces cookies sont nécessaires pour établir votre \"session\" avec Explora, qui permet des fonctionnalités telles que la connexion de l'utilisateur, et protège contre les attaques de falsification de requêtes inter-sites (CSRF)."
    analytics: "Tess utilise Google Analytics pour suivre comment les utilisateurs découvrent Tess et interagissent avec le service. Les informations recueillies comprennent les pages que vous avez visitées, les termes de recherche qui vous mènent à TESS et des informations sur votre navigateur Web. Aucune information personnellement identifiable n'est envoyée à Google."
    retention: "Vos informations seront conservées par Explora jusqu’à ce que vous choisissiez de les supprimer, que vous supprimiez votre compte ou que le service Explora cesse d’exister."
    code: "TESS adhère au Code de conduite de <a href='https ://wiki.refeds.org/display/CODE/Code+of+Conduct+for+Service+Providers'> géant en matière de protection des données pour les fournisseurs de services dans l'</a> UE/EEE"
    controller: "Le contrôleur de données de TESS est l'Université de Manchester."
    post: "<strong>The TESS Team</strong> <br/>Room 1,17 c / o École d'informatique, <br/>Kilburn Building, <br/>Oxford Road, <br/>Manchester, <br/>M13 9PL"
