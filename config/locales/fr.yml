  register:
    buttons:
      content_providers: 'Enregistrer le fournisseur de contenu'
      events: 'Enregistrer l''événement'
      materials: 'Enregistrer le matériel de formation'
      workflows: 'Créer un flux de travail'
      trainers: 'S''inscrire comme formateur'
      collections: 'Créer une collection'
    registering_resources_in: "Enregistrement des ressources dans %{site_name}"
    resources: >
      <p>Les ressources de formation (événements et matériel) peuvent être ajoutées à TeSS pour rejoindre un public plus large, augmenter l'impact et renforcer la participation à l'événement. L'enregistrement d'événements et de matériel de formation les rend plus faciles à trouver de diverses manières par les utilisateurs.</p>
    methods: >
      <p>Il existe deux façons d'enregistrer le matériel ou des événements à afficher dans Explora: <ol> <li>Configurer une solution d'enregistrement <a href="#automatic">automatique </a> ;</li> <li>Utiliser notre formulaire pour les enregistrer <a href="#manual">manuellement</a>.</li> </ol> </p>
    automatic: >
      Explora offre plusieurs options pour intégrer automatiquement des ressources provenant de sources externes. Cela peut être utile si vous gérez beaucoup de matériel et une grande collection d'événements qui changent fréquemment.
    structured: >
      <p>Pour enregistrer automatiquement des ressources dans Explora, nous devons pouvoir extraire les données des sources cibles de manière fiable. À cette fin, il est utile que les données soient structurées selon un format standard.</p> <p>Les exemples suivants illustrent les types de données structurées avec lesquelles Explora peut travailler.</p> <p>Si votre site Web ne contient actuellement aucune donnée structurée et que vous souhaitez que vos ressources soient ajoutées à Explora, nous vous recommandons d’utiliser <a href="http ://bioschemas.org" target="_blank">Bioschemas</a> pour structurer votre site.</p>
    schema: >
      <p> <a href='https ://schema.org', target='_blank'>Schema.org</a> est un projet mené par un consortium de moteurs de recherche. Schema.org a créé une vaste bibliothèque de schémas que les webmaîtres peuvent utiliser pour baliser explicitement le contenu de leurs sites Web afin d'améliorer la visibilité et l'interopérabilité des moteurs de recherche.</p> </p> <p> <a target='_blank', href='https ://bioschemas.org'>Bioschemas</a> est une initiative visant à complémenter le travail de Schema.org pour aider à améliorer la trouvabilité des ressources en ligne dans le domaine des sciences de la vie.</p> Les deux principales activités de Bioschemas sont: <ul> <li>Proposer de nouveaux types et propriétés à Schema.org pour permettre la description des ressources en sciences de la vie.</li> <li>Définir des profils d'utilisation sur les types Schema.org qui identifient les propriétés essentielles à utiliser pour décrire une ressource.</li> </ul> <p> Explora prend en charge les profils de Bioschemas suivants:<br/> <strong>pour les événements qui sont des cours,</strong> <ul> <li> <a target='_blank', href='https ://bioschemas.org/profiles/CourseInstance/1.0-RELEASE'>CourseInstance</a> </li> <li> <a target='_blank', href='https ://bioschemas.org/profiles/Course/1.0-RELEASE'>Cours</a> </li> </ul> <strong>pour les autres événements,</strong> <ul> <li> <a target='_blank',href='https://bioschemas.org/profiles/Event/0.2-DRAFT-2019_06_14'>Événements </a> </li> </ul> <strong> </a> </li> </ul>pour le matériel de formation </strong> <ul> <li> <a target='_blank', href='https ://bioschemas.org/profiles/TrainingMaterial/1.0-RELEASE'>
    sitemap: >
      <p>Pour aider les moteurs de recherche (et TeSS) à trouver toutes les pages d'un site qui ont le balisage Bioschemas, un <a target='_blank', href='https ://developers.google.com/search/docs/crawling-indexing/sitemaps/overview'>sitemap</a> devrait être utilisé. Un sitemap est essentiellement une liste de répertoire de toutes les pages de votre site.</p> <p>C'est une norme bien établie, et il devrait y avoir des bibliothèques de sitemapd et des plugiciels disponibles pour n'importe quel logiciel que vous utilisez pour votre site.</p>
    api: >
      Les interfaces de programmation d'application <p>, ou API, ont généralement des URL de point de terminaison qui, lorsqu'elles sont accessibles, renvoient des données dans un format d'échange de données commun, tel que JSON.</p> <p>TeSS prend actuellement en charge les API pour: <ul> <li> <a target='_blank', href='https ://eventbrite.com'>Eventbrite</a> - pour les événements</li> <li> <a target='_blank', href='https ://zenodo.com'>Zenodo</a> - pour le matériael</li> <li>Autres plateformes TeSS - pour les événements</li> </ul> </p>
    calendar: >
      <p>Plusieurs organisations utilisent des applications de calendrier pour organiser et afficher leurs événements. Ceux-ci peuvent être faits sur mesure ou, plus probablement, utiliser des applications comme Google Agenda. Ces applications conservent un fichier sous-jacent pour le stockage et la récupération des événements, généralement au format iCal (.ics).</p> <p>Explora peut extraire des descriptions, des dates et des lieux d'événements à partir de fichiers iCal.</p>
    other_types: >
      <ul> <li> <b>RSS Feed</b>: un flux RSS est un type de format de nouvelles. De nombreux sites Web ont de tels flux, qui listent les messages récents dans un format standard. Nous pouvons écrire des scripts pour analyser ce format</li> <li> <b>Référenciel Git:</b> un référentiel Git est un répertoire contenant des fichiers qui peuvent être édités en collaboration. Si vous utilisez GitHub (ou similaire) pour développer vos ressources de formation, et/ou utilisez les pages GitHub pour les afficher, nous pouvons écrire un script qui clone le référentiel et extrait les informations sur les ressources. Nous pouvons vous demander de créer un fichier de métadonnées au format YAML pour nous aider à extraire les métadonnées ;</li> <li> <b>Autre:</b> si vous avez des métadonnées de formation dans un autre format structuré (par exemple, un dump XML ou JSON, un fichier CSV, un fichier YAML ou un autre format), il est possible pour l'équipe TeSS d'écrire un script pour l'analyser.</li> </ul>
    user_managed_sources: >
      <p>Les propriétaires  et éditeurs de fournisseurs de contenu dans TeSS peuvent enregistrer et gérer <em>les sources</em> pour être automatiquement importées. Une source se compose d'une URL que TeSS peut trouver et d'une méthode d'importation qui indique à TeSS comment le contenu de l'URL doit être traité.</p> <p>Une fois enregistrée, une source devra être approuvée par un administrateur avant d'être active, mais peut être testée pour voir exactement quelles métadonnées TeSS peut en extraire.</p> <p>Pour enregistrer une source, cliquez sur l'onglet Sources sur la page de votre fournisseur de contenu, ou si vous n'avez pas encore enregistré de fournisseur de contenu, cliquez sur le bouton ci-dessous.</p>
    advice: >
      Contactez <a href="mailto :%{contact_email}">%{contact_email}</a> pour savoir comment enregistrer automatiquement votre contenu dans Explora
    manual: >
      <p>Les resources peuvent être ajoutées manuellement à TeSS.</p> <p>Pour ce faire, créez d'abord un compte gratuit. Les membres des établissements d'enseignement peuvent ouvrir une session à l'aide de LS-Login.</p> <p> Une fois enregistré et connecté, les boutons Enregistrer l'événement et Enregistrer le matériel seront visibles sous les onglets des événements et du matériel. Vous pouvez également cliquer ici:</p>
    learning_paths: 
      register_in: "Parcours d'apprentissage dans %{site_name}"
      what: >
        Un parcours d’apprentissage est un parcours qui guide les apprenants à travers un ensemble de modules (cours/matériels) à entreprendre progressivement pour acquérir les connaissances et les compétences (des compétences de pensée d’ordre inférieur aux compétences de pensée d’ordre supérieur) souhaitées sur un sujet.
      editorial: >
        <p>Il existe plusieurs rôles associés aux parcours d’apprentissage:</p> <ul> <li> <b>Auteur</b> : Personnes et organisations qui ont participé à la préparation, la création ou la présentation de l’œuvre publiée.</li> <li> <b>Contributeur</b> : Personnes et les organisations qui ont contribué à l'œuvre publiée, mais qui ne sont pas des auteurs.</li> <li> <b>Collaborateur</b> : Personne à qui l'on a accordé des droits d'édition sur le matériel, un sujet ou un parcours d'apprentissage par la personne (propriétaire) qui l'a créé.</li> <li> <b>Éditeur</b>: Personne autorisée à créer un parcours d'apprentissage dans TeSS , selon le processus éditorial de sa communauté.</li> <li> <b>Propriétaire</b>: Personne qui a créé du matériel, un sujet ou un parcours d'apprentissage dans TeSS.</li> </ul> <p>Avant d'enregistrer un parcours d'apprentissage, un prestataire de formation doit: </p> <ol> <li>Assigner un éditeur de parcours d'apprentissage (propriétaire).</li> <li>Contactez l'équipe TeSS pour assigner le rôle d'éditeur de parcours d'apprentissage à son compte.</li> <li>Completez vos processus éditoriaux internes (le cas échéant) avant de commencer à enregistrer les parcours d'apprentissage sur TeSS.</li> </ol> <p>Après que ces tâches sont terminées:</p> <ul> <li>L'éditeur de parcours d'apprentissage a la responsabilité de créer des parcours d'apprentissage pour son fournisseur.</li> <li>Il est aussi responsable de mettre en œuvre tous les protocoles requis par la communauté qui offre le parcours d'apprentissage.  Par exemple, les parcours d’apprentissage de la communauté ELIXIR suivront le protocole créé par le ELIXIR Training Platform/Learning Paths Focus Group.</li></ul> <p>Gouvernance: Maintenir le parcours d'apprentissage </p> <ol> <li>Il est de la responsabilité de l'éditeur de parcours d'apprentissage de maintenir les parcours d'apprentissage de leur communauté.</li> <li>Il peut affecter des collaborateurs à travailler sur chaque parcours d'apprentissage, en fonction de l'expertise requise.</li> </ol>
      overview: >
        <p>Pour enregistrer un parcours d'apprentissage, vous devez suivre les trois étapes décrites ci-dessous:</p> <ol> <li>Enregistrer le matériel de formation </li> <li>Créer un sujet de parcours d'apprentissage et y ajouter du matériel (répéter pour chaque sujet)</li> <li>Inscrivez un parcours d'apprentissage et ajoutez des sujets au parcours d'apprentissage à it</li> </ol> <p>Pour enregistrer un parcours d'apprentissage et ses sujets, connectez-vous d'abord. Le bouton Enregistrer un parcours d'apprentissage deviendra visible sur la page des parcours d'apprentissage, et le bouton Créer un sujet deviendra visible sur la page des sujets. Si vous ne voyez pas ces boutons, contactez tess-support@googlegroups.com pour demander l'autorisation nécessaire.</p> <p>Les trois étapes pour enregistrer un parcours d'apprentissage sont décrites en détail ci-dessous.</p> 
      training_material: >
        <p>Pour <a href='%{registering_resources_path}'>enregistrer les supports de formation, suivez les instructions ci-dessous </a>.  Si votre matériel de formation est déjà enregistré, ignorez cette étape.  Chaque matériel peut se voir attribuer un niveau de compétence (débutant, intermédiaire, avancé).</p>
      creating_topics: >
        <p>Le sujet du parcours d'apprentissage est une liste ordonnée du matériel.  Un niveau de compétence (débutant, intermédiaire, avancé), une description et un ensemble de mots-clés peuvent être attribués à un sujet. Un parcours d'apprentissage contient une liste ordonnée d'un ou plusieurs sujets. </p> <p>Pour créer un sujet de parcours d'apprentissage:</p> <ol> <li>Sous l'onglet Parcours d'apprentissage, cliquez sur le bouton Sujets en haut à droite.</li> <li>Cliquez sur le bouton Créer un sujet en haut à droite.</li> <li>Pour ajouter un nouveau sujet, une description et des mots-clés.</li> <li>Sélectionnez le niveau de compétence du sujet (débutant, intermédiaire ou Avancé.</li> <li>Pour ajouter un support de formation au sujet, cliquez dans la case Ajouter du nouveau matériel.  Sélectionnez le matériel. Vous pouvez écrire un commentaire à afficher avec le matériel, si vous souhaitez donner plus de contexte ou expliquer quelles parties du matériel sont pertinentes pour le sujet.</li> <li>Répétez l'étape 5 pour ajouter d'autre matériel pour ce sujet, tous au même niveau de compétence.</li> <li>Vous pouvez réorganiser le matériel à l'aide des icônes fléchées.</li> <li>Lorsque vous avez terminé, cliquez sur le bouton Créer un sujet.</li> </ol>
      topic_naming: >
        <p>Lorsque vous donnez un titre à votre sujet de parcours d'apprentissage, veuillez utiliser un nom descriptif.  Cela permettra également d'éviter les chevauchements potentiels avec des noms identiques ou similaires utilisés par d'autres fournisseurs de contenu, réduisant ainsi le risque de sélectionner par erreur les mauvais sujets.</p> <p>Exemples de bons noms de sujets:</p> <ul> <li>BIOL30561 thème 1: Introduction à Galaxy</li> <li>Module 3: Se déplacer dans les environnements de code</li> </ul> <p>Exemples de mauvais noms de sujets:</p> <ul> <li>Sujet 3</li> <li>Python</li> </ul>
      paths: >
        <p>Après avoir créé tous vos sujets et ajouté le matériel de formation, vous êtes prêt à enregistrer votre parcours d'apprentissage.</p> <ol> <li>Sous l'onglet Parcours d'apprentissage, cliquez sur le bouton Enregistrer parcours d'apprentissage en haut à droite.</li> <li>Remplissez les deux champs obligatoires: titre, description et champs tels que sujets scientifiques, mots clés, license, statut, DOI, fournisseur de contenu, auteurs, contributeurs, publics cibles, prérequis, objectifs d'apprentissage, nœuds. Nous vous recommandons de remplir autant de champs que possible pour avoir des métadonnées riches associées à votre cours.</li> <li>Pour chaque rubrique, cliquez dans la case Ajouter une nouvelle rubrique et commencez à taper son nom. Sélectionnez le sujet approprié.</li> <li>Reprenez l'étape 3 pour ajouter plusieurs sujets.</li> <li>Vous pouvez réorganiser les sujets à l'aide des icônes fléchées.</li> <li>Le chemin d'apprentissage sera public par défaut. Supprimez la coche dans la case Public si vous voulez cacher ce parcours d'apprentissage à toute personne qui n'est pas le créateur ou un collaborateur.</li> <li>Lorsque vous avez terminé, cliquez sur le bouton Enregistrer le parcours d'apprentissage.</li> </ol>
      collaborators: >
        <p> Les collaborateurs sont des utilisateurs de TeSS qui peuvent modifier un parcours ou un sujet d'apprentissage après sa création.  Seul le propriétaire du parcours d'apprentissage ou du sujet peut ajouter et supprimer des collaborateurs. Pour ajouter un collaborateur:</p> <ol> <li>naviguez jusqu'à la page correspondant à ce parcours d'apprentissage ou à ce sujet.</li> <li>Cliquez sur le bouton Collaborateurs en haut à droite de la page.</li> <li>Commencez à taper le nom ou le nom d'utilisateur du collaborateur que vous souhaitez ajouter et sélectionnez-le.  Le collaborateur doit être un utilisateur enregistré de TeSS.</li> <li>Reprenez les étapes pour tout collaborateur supplémentaire.</li> <li>Lorsque vous avez terminé, cliquez sur le bouton Terminé.</li> </ol>
      updating_paths: >
        <p>Pour mettre à jour un chemin d'apprentissage ou un sujet, vous devez en être le propriétaire ou le collaborateur:</p> <ol> <li>Naviguez jusqu'à la page correspondant à ce chemin d'apprentissage ou à ce sujet.</li> <li>Cliquez sur le bouton Modifier en haut à droite de la page.</li> <li>Entrez vos modifications, puis cliquez sur le bouton Mettre à jour le chemin d'apprentissage en bas.</li> </ol> <p>Si vous souhaitez supprimer le chemin d'apprentissage ou le sujet, utilisez le bouton Supprimer  près du bouton modifier de l'élément.</p>
      view_paths: >
        <p>Les parcours d'apprentissage peuvent être parcourus et recherchés dans TeSS. Ils sont organisés par sujet.</p> <ol> <li>Pour afficher les parcours d'apprentissage, cliquez sur Parcours d'apprentissage dans le menu principal.  (Astuce: Pour afficher un parcours d'apprentissage, vous n'avez pas besoin d'être connecté à TeSS.)</li> <li>Pour parcourir tous les sujets, cliquez sur le bouton Sujets en haut à droite.</li> <li>Vous pouvez aussi cliquer dans la zone de recherche, taper votre requête et appuyer sur la touche Retour.</li> <li>Cliquez pour afficher un parcours d'apprentissage. Lisez le sommaire. Les détails sur le matériel inclus apparaissent ci-dessous; cliquez sur un élément pour l'ouvrir. Des informations sur le fournisseur de contenu apparaissent sur la gauche.</li> <li>Pour créer une collection de vos parcours d'apprentissage favoris, cliquez sur l'icône en forme d'étoile en haut de chaque parcours d'apprentissage pour les ajouter à une liste. Vous pouvez afficher vos ressources étoilées ultérieurement en cliquant sur l'icône utilisateur en haut à droite de l'écran, puis sur « mes étoiles ».  Pour utiliser la fonction STAR, vous devez être un utilisateur TESS enregistré.</li>
      view_topics: >
        <ol> <li> dans l'onglet « parcours d'apprentissage », cliquez sur le bouton « gérer les sujets » en haut à droite.</li> <li>Vous pouvez parcourir les sujets du parcours d'apprentissage en utilisant les filtres à gauche pour sélectionner des mots-clés ou une date.</li> <li>Alternative, cliquez dans la zone de recherche et tapez une requête, puis appuyez sur entrée pour afficher les résultats.</li> <li>Cliquez sur le titre d'un sujet pour l'afficher.  À partir de la page des sujets, vous pouvez afficher tout le matériel.</li> </ol>
  home:
    title: 'Accueil'
    welcome: |
      Comment la plateforme <span class="text-primary">Explora</span> peut-elle vous aider?
    subtitle: >-
      Découvrez la formation canadienne en IRN. Effectuez une recherche dans Explora
      pour découvrir des ateliers, des webinaires, des camps d’entraînement et d’autres
      activités de formation à travers le Canada. Ces ressources sont conçues pour aider
      les chercheurs et chercheuses, quelles que soient leur expérience et l’étape où
      ils se trouvent dans leur carrière, à développer des compétences en calcul informatique
      de pointe, en gestion des données de recherche et en logiciels de recherche.
