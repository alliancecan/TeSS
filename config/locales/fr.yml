    faq:
      title: Foire aux questions
      who:
        q: Qui peut enregistrer du contenu dans TeSS?
        a: >
          <p>Nous accueillons tout contenu de formation pertinent pour les personnes qui travaillent dans les sciences de la vie et dans les domaines adjacents.</p>
      how:
        q: Comment enregistrer du contenu dans TeSS?
        a: >
          <p>Vous pouvez enregistrer du contenu dans TeSS automatiquement ou manuellement.</p> <p>Pour ajouter du contenu manuellement, vous devrez vous connecter et remplir le formulaire d'inscription pour des documents ou des événements.</p> <p>TeSS peut également enregistrer automatiquement du contenu à partir d'un site Web externe ou d'une autre source sur le Web.</p> <p> <a href='about/registering'>Voir ici pour plus d'informations.</a> </p>
      why:
        q: Pourquoi enregistrer du contenu dans TeSS?
        a: >
          <p>Enregistrer les événements de formation et les matériaux dans TeSS les rend plus faciles à trouver de diverses manières par les utilisateurs.</p>

          <p>La formation dans TeSS peut être découverte...</p> <ul>

          <li> <strong>dans TeSS</strong>, par les visiteurs naviguant sur TeSS ou s'abonnant aux notifications.</li>

          <li> <strong>dans les résultats des moteurs de recherche.</strong>, en raison de l'optimisation de notre moteur de recherche.</li>

          <li> <strong>

          à travers d'autres sites webes</strong> qui affichent le contenu de TeSS soit en utilisant nos widgets ou notre API publique.</li> </ul> 

      embed:
        q: Puis-je afficher du contenu de TeSS sur le site Web de mon organisation?
        a: >
          <p>Oui, une sélection de widgets est disponible pour afficher les événements de formation et le matériel de TeSS dans une variété de formats.</p> <p> <a href='https ://elixirtess.github.io/TeSS_widgets/' target='_blank'>Cliquez ici pour voir des exemples de widgets et comment les utiliser.</a> </p>
      subscribe:
        q: Puis-je m'abonner aux mises à jour?
        a: >
          <p>TeSS fournit un service d'abonnement personnalisable, vous permettant de choisir exactement les types de formation dont vous souhaitez être averti.</p> <p>Choisissez comment vous souhaitez recevoir des mises à jour:</p> <ul> <li> <strong>Courriel</strong> - des courriels quotidiens, hebdomadaires ou mensuels contenant un résumé des nouveaux événements ou du nouveau matériel.</li> <li> <strong>

          Agenda</strong> - Voir les nouveaux événements directement dans votre calendrier en ligne.</li> <li> <strong>
            Flux RSS </strong> - Voir les nouveaux événements dans un lecteur RSS.</li> </ul>

