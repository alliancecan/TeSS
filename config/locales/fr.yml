    registry_html: >
      <p>L’Alliance de recherche numérique du Canada et sa main-d’œuvre répartie
      proposent à la communauté de recherche la formation dont elle a besoin pour
      exploiter le plus efficacement possible l’infrastructure de recherche numérique
      (IRN) du Canada. Forte d’un réseau national d’institutions, d’organisations et
      de groupes d’experts, l’Alliance soutient un large éventail de possibilités de
      formation, notamment des ateliers, des séminaires en ligne et des camps
      d’entraînement. Ces événements de formation couvrent des sujets essentiels,
      tels que le calcul informatique de pointe (CIP), la gestion des données de
      recherche (GDR) et les logiciels de recherche (LR).</p>
      <p>En rassemblant et en mettant de l’avant les activités de formation proposées
      par ce réseau réparti aux quatre coins du Canada, l’Alliance s’assure que les
      chercheurs et chercheuses, quelle que soit leur discipline ou l’étape où ils se
      trouvent dans leur carrière, développent les connaissances et les compétences
      nécessaires pour mener des recherches de pointe. Cet effort de collaboration,
      rendu possible par les contributions d’une communauté diversifiée de formatrices
      et formateurs, permet de renforcer les capacités de recherche nationales et
      de favoriser un écosystème de recherche mieux relié et plus spécialisé.</p>
    history_html: >
      <hr>
      Le logiciel qui fait fonctionner Explora s'appelle <a href="https://github.com/ElixirTeSS/TeSS">TeSS</a>.
      TeSS a été initialement développée dans le cadre de <a href='https ://elixir-europe.org/' target='_blank'>ELIXIR</a>, l'infrastructure distribuée européenne pour les données des sciences de la vie. L’un des objectifs d’ELIXIR est de former des chercheurs scientifiques à mieux utiliser les infrastructures de calcul pour solutionner des problématiques de recherche cruciales. Pour ce faire, il est nécessaire d'avoir accès à des possibilités de formation en présentiel et à des ressources et du matériel de formation, actuellement dispersés dans toute l'Europe.
    events: >
      Les événements dans Explora sont définis comme étant des occasions de formation en présentiel ou en ligne, avec des heures de début et de fin. Ceux-ci prennent principalement la forme d'ateliers, de cours, de webinaires, etc.; mais Explora recueille également des informations sur les conférences, les réunions et les marathons de programmation, car ceux-ci peuvent également être des occasions d'apprentissage.
    nominatim: "<a href='https ://wiki.openstreetmap.org/wiki/Nominatim' target='_blank' rel='noopener'>Nominatim</a>"
    materials: >
      Le matériel est défini comme comme des ressources de formation accessibles en tout temps. Il peut être dans une variété de formats différents, y compris des didacticiels en ligne, des vidéos, des présentations PowerPoint, etc.
    workflows: >
      Parmi les nouveaux outils graphiques de Explora se trouvent les flux de travail pour la formation. Trois principaux types de flux de travail sont en cours de développement: Ressources pédagogiques, parcours d'apprentissage et cartes conceptuelles. Ceux-ci regroupent différents types et/ou approches de formation, à différents niveaux de granularité, dans des affichages faciles à utiliser.
    learning_paths: >
      Afin de faire progresser leurs compétences, les apprenants doivent s’engager dans un parcours, ou une trajectoire de développement. Pour faciliter ceci, les parcours d’apprentissage visent à structurer, au sein de flux de travail simples, l’ensemble des ressources de formation que les apprenants doivent étudier afin d’atteindre leurs objectifs d’apprentissage. Des parcours d’apprentissage sont développés par ELIXIR TeSS, ELIXIR-NL et ELIXIR UK.
    resources: >
      Dans ce type de flux de travail, les apprenants sont initiés à diverses tâches pratiques, liées à des outils en ligne et/ou des bases de données associées, dans des modules autonomes. Chaque module comprend i) des énoncés succincts des objectifs d'enseignement et des résultats d'apprentissage, pour transmettre aux apprenants ce qu'ils seront en mesure de faire à la fin du module; ii) une série de questions ou d'idées pour provoquer une réflexion critique sur les tâches qui ont été accomplies; iii) des informations générales supplémentaires et des lectures complémentaires pour consolider l'apprentissage et la recherche; et enfin iv) des questions à choix multiple pour évaluer la compréhension. Des ressources pédagogiques en introduction à la bio-informatique des séquences et structurale sont actuellement développées par ELIXIR TeSS, ELIXIR-UK et le groupe britannique de bio-informatique structurale (via le projet FunPDBe).
    subscribe: >
      Explora possède une fonction d'abonnement pour aider les utilisateurs à rester informés sur les cours, ateliers et conférences qui les intéressent. Le service peut être personnalisé en sélectionnant les filtres appropriés et il est lancé en cliquant sur le bouton pour s'abonner. Les utilisateurs peuvent choisir de recevoir des notifications par courriel sur les événements à venir ou de les ajouter automatiquement à leur application de calendrier préférée.
    subscribe_search_html: >-
      Il est possible de s'abonner à toute recherche d'événement. Il vous suffit de vous rendre sur la page <a href= "%{events_path}"> de recherche d'événements</a> et, après avoir choisi les termes de recherche et/ou les filtres que vous souhaitez, de cliquer sur le bouton "S'abonner" pour recevoir des alertes par courriel ou pour suivre les événements dans votre application de calendrier.
    subscription_manager: >
      La page <a href='%{subscriptions_path}'>Gestionnaire d'abonnements</a> peut être utilisée pour modifier la fréquence des abonnements ou pour les supprimer.
    widgets_and_api: >
      Pour accéder aux données de Explora, les organisations peuvent facilement importer des informations sur des événements et des documents qui se trouvent sur leur site à l’aide de widgets, ou encore créer des flux personnalisés à l’aide de notre API.
    collect_events: >
      %{site_name} collecte des informations sur les événements auprès de %{count} fournisseurs de contenu et complémente les données par des informations de géolocalisation trouvées à l'aide de %{nominatim}.
    discover_events: Découvrir les événements
    collect_materials: "%{site_name} collecte du matériel auprès de %{count} fournisseurs de contenu."
    discover_materials: Découvrir le matériel
    discover_learning_paths: Découvrir les parcours d'apprentissage
    discover_workflows: Découvrir les flux de travail
  developer:
    license: >
      TeSS s'engage à respecter les principes FAIR: rendre les données faciles à utiliser, accessibles, interopérables et réutilisables. Tout le contenu de TeSS est disponible sous licence CC BY 4,0 et peut être consulté via notre API et nos widgets. La base de code TeSS est également disponible pour être réutilisée sous la licence BSD; elle se trouve sur GitHub.
    code_license: >
      <a href="https ://github.com/ElixirTeSS/TeSS/blob/master/LICENSE", target="_blank">BSD 3-Clause<i class="icon icon-md arrow-top-right-icon"> </i> </a>
    data_license: >
      <a href="https ://creativecommons.org/licenses/by/4.0/", target="_blank">CC-BY 4.0<i class="icon icon-md arrow-top-right-icon"> </i> </a>
    gmaps_countries: >
      Royaume-Uni, Espagne, Portugal, France, Belgique, Irlande, Estonie, Finlande, Allemagne, Autriche, Italie, Hongrie, République tchèque, Estonie, Danemark,  Grèce, Luxembourg, Pays-Bas, Suisse, Norvège, Suède,  Slovénie
    widgets: >
      Les widgets sont des morceaux de code javascript qui peuvent être copiés dans le code source du site Web pour afficher le contenu TeSS. Il existe plusieurs styles et fonctionnalités différents disponibles à partir de notre suite de widgets configurables. Les widgets peuvent être utilisés pour améliorer votre site et offrir à votre communauté des listes d'événements ou des ressources de formation.
